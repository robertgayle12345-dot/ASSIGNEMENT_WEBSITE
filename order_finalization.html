<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Order Finalization</title>
    
</head>
<body>
    <header>
            <div id="banner">
            <p>You Can Design Your Own Cake Just As You'd Like It !</p>
            </div>

            <nav>
                <a href="index_home_page.html">HOME PAGE</a>
                <a href="cake_design_setup.html">DESIGN YOUR CAKE HERE</a>
                <a href="login_page.html">LOG IN HERE</a>
            </nav>
        
</header>
    
            <main>
            <h1>Cake Order Finalization</h1>
            <hr/>
            
        <h2>General Inquiries</h2>
            <form action="confirmation.html" id="contactform">
                <label for="Fullname">Name: *</label>
                <input required type="text" id="Fullname" name="Fullname"/>
                <br/><br/>
                <label for="Email">Email Address:</label>
                <input required type="email" id="email" name="emailaddress"/>
                <br/><br/>
                <label>Would you like to proceed with your order?</label>
                <br/><br/>
                <input type="radio" value="Y" name="Service"/>Yes
                <input type="radio" value="N" name="Service"/>No
                <br/><br/>
                 <input placeholder="📌 place address here" type="text"/>
                <button type="Button" onclick="ClearForm()">Delivery Pickup</button>
                <br/><br/>
                <br/><br/>
                <label for="Payment">Payment Method: </label>
                <select id="Payment" name="Payment">
                    <option value="Credit Card">Credit Card</option>
                    <option value="Debit Card">Debit Card</option>
                    <option value="PayPal">PayPal</option>
                </select>
                <br/><br/>
                <label for="Card Holder Name">Card Holder Name:</label>
                <input required type="text" id="CardHolderName" name="CardHolderName"/>
                <br/><br/>
                <label for="Card Number">Card Number:</label>
                <input required type="text" id="CardNumber" name="CardNumber"/>
                <br/><br/>
                <label for="CVV">CVV:</label>
                <input required type="text" id="CVV" name="CVV"/>
                <br/><br/>

                <br/><br/>

                <label for="inquiry">State Any Other Inquiry *</label><br/>
                <textarea required cols="50" rows="10" maxlength="150" id="inquiry" name="inquiry"></textarea>
                <br/><br/>
                <input type="submit"/>
                <button type="Button" onclick="ClearForm()">Clear</button>
            </form>
        </article>
            
  
</main>
    
<footer>
           
        
</footer>
    <script src="javascript/site.js"></script>   
    
</body>
</html>
